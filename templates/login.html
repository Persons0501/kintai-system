<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勤怠管理 - ログイン</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>勤怠管理</h1>
            <p class="subtitle">Attendance System</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages" style="padding: 0; max-width: 100%;">
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="login_id">ID</label>
                    <input type="text" id="login_id" name="login_id"
                           placeholder="IDを入力" required autocomplete="username"
                           inputmode="numeric">
                </div>
                <div class="form-group">
                    <label for="password">パスワード / Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="パスワードを入力" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">ログイン / Login</button>
            </form>
        </div>
    </div>
</body>
</html>
